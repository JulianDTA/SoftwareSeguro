services:
  postgres:
    image: postgres:16-alpine
    container_name: veci_postgres
    environment:
      POSTGRES_USER: veci
      POSTGRES_PASSWORD: veci1234
      POSTGRES_DB: veci_herramientas
    ports:
      - "5432:5432"
    volumes:
      - veci_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veci -d veci_herramientas"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak_sso
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── KMS: HashiCorp Vault (motor de cifrado Transit AES-256-GCM) ──────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: vault_kms
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-only-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>&1 | grep -c Initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Inicializa el Transit Engine en Vault (ejecuta una sola vez) ─────────────
  vault-init:
    image: hashicorp/vault:1.17
    container_name: vault_init
    environment:
      VAULT_ADDR: "http://vault_kms:8200"
      VAULT_TOKEN: "dev-only-token"
    entrypoint: >
      sh -c "
        until vault status -address=http://vault_kms:8200 2>/dev/null | grep -q Initialized; do
          echo 'Esperando Vault...'; sleep 2;
        done &&
        vault secrets enable transit || true &&
        vault write -f transit/keys/sso-comms type=aes256-gcm96 || true &&
        echo 'Vault Transit engine habilitado con clave sso-comms'
      "
    depends_on:
      vault:
        condition: service_healthy
    restart: on-failure:5

volumes:
  veci_pgdata:
